<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Reservas Facundo</title>
  <style>
    :root {
      --ink: #3a4a5c;
      --ink-soft: #6b7c8f;
      --blue: #5a9fd4;
      --blue-soft: #cfe6f7;
      --soft: #e8f3fb;
      --white: #fdfeff;
      --rose: #c489a0;
      --rose-soft: #f7e8ef;
      --shadow: 0 10px 40px rgba(90, 140, 180, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(ellipse 70% 45% at 50% 0%, #e3f1fb 0%, transparent 55%),
        linear-gradient(180deg, #f9fcff 0%, #eef6fc 100%);
      color: var(--ink);
      min-height: 100vh;
      padding: 28px 18px 60px;
      line-height: 1.5;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 0.92rem;
    }
    .nav a { color: var(--blue); text-decoration: none; font-weight: 600; }
    .nav a:hover { text-decoration: underline; }
    .hero {
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(126,182,224,0.35);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px 20px;
      margin-bottom: 18px;
    }
    .pill {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--soft);
      border: 1px solid var(--blue-soft);
      padding: 5px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    h1 {
      font-family: "Snell Roundhand", "Segoe Script", "Apple Chancery", cursive;
      font-weight: 400;
      color: var(--blue);
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      line-height: 1.15;
      margin-bottom: 6px;
    }
    .lead { color: var(--ink-soft); margin-bottom: 14px; }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 1px solid rgba(126,182,224,0.35);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.86rem;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .stat-chip strong { color: var(--blue); font-weight: 800; }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin: 16px 0 18px;
    }
    .toolbar input {
      flex: 1;
      min-width: min(100%, 240px);
      border: 1.5px solid var(--blue-soft);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 1rem;
      outline: none;
      background: #fff;
    }
    .toolbar input:focus { border-color: var(--blue); }
    .list { display: grid; gap: 12px; }
    .card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 14px;
      align-items: start;
      background: var(--white);
      border: 1px solid rgba(126, 182, 224, 0.35);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(90, 140, 180, 0.16);
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 1rem;
      color: #fff;
      background: linear-gradient(145deg, #8fc0e8, #5a9fd4);
      box-shadow: 0 8px 16px rgba(90,159,212,0.25);
    }
    .avatar.alt {
      background: linear-gradient(145deg, #e8b7c8, #c489a0);
      box-shadow: 0 8px 16px rgba(196,137,160,0.25);
    }
    .gift {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .guest {
      color: var(--ink);
      font-size: 0.95rem;
    }
    .guest a { color: var(--blue); text-decoration: none; }
    .guest a:hover { text-decoration: underline; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      font-size: 0.78rem;
      font-weight: 700;
      color: #8a5a72;
      background: var(--rose-soft);
      border: 1px solid #ecd0db;
      border-radius: 999px;
      padding: 4px 10px;
    }
    .tag.time {
      color: var(--ink-soft);
      background: var(--soft);
      border-color: var(--blue-soft);
    }
    .card-body { min-width: 0; }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .btn-delete {
      flex-shrink: 0;
      border: 1.5px solid #f0c2c2;
      background: #fff7f7;
      color: #b42318;
      font-weight: 700;
      font-size: 0.82rem;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    .btn-delete:hover {
      background: #ffe8e8;
      transform: translateY(-1px);
    }
    .btn-delete:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #3a4a5c;
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 0.92rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 60;
      max-width: 90vw;
      text-align: center;
    }
    .toast.show { opacity: 1; }
    .error {
      background: #fff1f1;
      color: #9b2c2c;
      border: 1px solid #f5c2c2;
      border-radius: 14px;
      padding: 14px 16px;
    }
    .empty {
      text-align: center;
      color: var(--ink-soft);
      padding: 36px 16px;
      background: rgba(255,255,255,0.7);
      border: 1px dashed var(--blue-soft);
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html">← Invitación</a>
      <a href="lista.html">Lista de regalos</a>
    </div>

    <section class="hero">
      <div class="pill">Baby Shower · Facundo</div>
      <h1>Reservas</h1>
      <p class="lead">Quién se anotó en cada regalo, al instante.</p>
      <div class="stats-row" id="stats">
        <span class="stat-chip">Cargando…</span>
      </div>
    </section>

    <div class="toolbar">
      <input id="search" type="search" placeholder="Buscar por nombre, correo o regalo…" />
    </div>

    <div class="list" id="list"></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script>
    (function () {
      var cfg = window.BABY_SHOWER_CONFIG || {};
      var params = new URLSearchParams(location.search);
      var key = params.get("key") || "";
      var list = document.getElementById("list");
      var stats = document.getElementById("stats");
      var search = document.getElementById("search");
      var toast = document.getElementById("toast");
      var rowsCache = [];

      function showToast(text) {
        toast.textContent = text;
        toast.classList.add("show");
        setTimeout(function () { toast.classList.remove("show"); }, 2400);
      }

      if (!cfg.ADMIN_KEY || key !== cfg.ADMIN_KEY) {
        stats.innerHTML = '<span class="stat-chip">Acceso restringido</span>';
        list.innerHTML = '<div class="error">Usa la URL con ?key=CLAVE (está en js/config.js → ADMIN_KEY).</div>';
        return;
      }

      if (!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY || cfg.SUPABASE_URL.indexOf("PEGAR_") === 0) {
        stats.innerHTML = '<span class="stat-chip">Falta configurar Supabase</span>';
        list.innerHTML = '<div class="error">Completa SUPABASE_URL y SUPABASE_ANON_KEY en js/config.js</div>';
        return;
      }

      var supabase = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

      function fmtDate(iso) {
        try {
          return new Date(iso).toLocaleString("es-CL", {
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit"
          });
        } catch (e) {
          return iso || "";
        }
      }

      function initials(name) {
        var parts = String(name || "?").trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return "?";
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }

      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function render(rows) {
        var q = (search.value || "").toLowerCase().trim();
        var filtered = !q ? rows : rows.filter(function (r) {
          var hay = [r.gift_name, r.guest_name, r.guest_email, r.gift_id].join(" ").toLowerCase();
          return hay.indexOf(q) >= 0;
        });

        stats.innerHTML =
          '<span class="stat-chip"><strong>' + rows.length + '</strong> reserva' + (rows.length === 1 ? "" : "s") + '</span>' +
          (q ? '<span class="stat-chip"><strong>' + filtered.length + '</strong> coinciden</span>' : '');

        if (!rows.length) {
          list.innerHTML = '<p class="empty">Aún no hay reservas. Cuando alguien se anote, aparecerá aquí.</p>';
          return;
        }

        if (!filtered.length) {
          list.innerHTML = '<p class="empty">No hay coincidencias para esa búsqueda.</p>';
          return;
        }

        list.innerHTML = filtered.map(function (r, i) {
          return (
            '<article class="card" data-gift-id="' + escapeHtml(r.gift_id) + '">' +
              '<div class="avatar' + (i % 2 ? " alt" : "") + '">' + escapeHtml(initials(r.guest_name)) + "</div>" +
              '<div class="card-body">' +
                '<div class="card-head">' +
                  '<div class="gift">' + escapeHtml(r.gift_name) + "</div>" +
                  '<button type="button" class="btn-delete" data-gift-id="' + escapeHtml(r.gift_id) + '" data-gift-name="' + escapeHtml(r.gift_name) + '">Eliminar</button>' +
                "</div>" +
                '<div class="guest"><strong>' + escapeHtml(r.guest_name) + "</strong> · " +
                  '<a href="mailto:' + escapeHtml(r.guest_email) + '">' + escapeHtml(r.guest_email) + "</a></div>" +
                '<div class="meta">' +
                  '<span class="tag">Reservado</span>' +
                  '<span class="tag time">' + escapeHtml(fmtDate(r.created_at)) + "</span>" +
                "</div>" +
              "</div>" +
            "</article>"
          );
        }).join("");
      }

      async function deleteReservation(giftId, giftName, btn) {
        var ok = window.confirm(
          '¿Eliminar la reserva de "' + giftName + '"?\n\nEl regalo volverá a quedar disponible en la lista.'
        );
        if (!ok) return;

        if (btn) {
          btn.disabled = true;
          btn.textContent = "Eliminando…";
        }

        // .select() confirma que RLS permitió borrar filas (si no, data viene vacío)
        var res = await supabase
          .from("reservations")
          .delete()
          .eq("gift_id", giftId)
          .select("gift_id");

        if (res.error) {
          showToast("No se pudo eliminar: " + res.error.message);
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Eliminar";
          }
          return;
        }

        if (!res.data || !res.data.length) {
          showToast("Supabase bloqueó el borrado. Corre add-delete-policy.sql en el SQL Editor.");
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Eliminar";
          }
          await load();
          return;
        }

        rowsCache = rowsCache.filter(function (r) { return r.gift_id !== giftId; });
        render(rowsCache);
        showToast("Reserva eliminada. El regalo quedó libre.");
      }

      list.addEventListener("click", function (e) {
        var btn = e.target.closest(".btn-delete");
        if (!btn) return;
        deleteReservation(btn.getAttribute("data-gift-id"), btn.getAttribute("data-gift-name") || "este regalo", btn);
      });

      async function load() {
        var res = await supabase
          .from("reservations")
          .select("*")
          .order("created_at", { ascending: false });

        if (res.error) {
          stats.innerHTML = '<span class="stat-chip">Error</span>';
          list.innerHTML = '<div class="error">' + escapeHtml(res.error.message) + "</div>";
          return;
        }

        rowsCache = res.data || [];
        render(rowsCache);
      }

      search.addEventListener("input", function () { render(rowsCache); });
      load();
      setInterval(load, 15000);
    })();
  </script>
</body>
</html>
